<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Havous — Brand Direction Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #06060A; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #06060A; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const decks = [
      {
        id: 1,
        deckLabel: "Deck 01",
        name: "Obsidian Ether",
        tagline: "Electric. Minimal. Sovereign.",
        bg: "#080810",
        gradientOrb1: "rgba(124,58,237,0.18)",
        gradientOrb2: "rgba(167,139,250,0.09)",
        accent: "#7C3AED",
        accentSoft: "#A78BFA",
        text: "#F8F8FF",
        textMuted: "rgba(248,248,255,0.40)",
        glassBg: "rgba(255,255,255,0.04)",
        glassBorder: "rgba(124,58,237,0.25)",
        glassBlur: "blur(20px)",
        glassShadow: "0 8px 40px rgba(124,58,237,0.14), inset 0 1px 0 rgba(255,255,255,0.07)",
        accentGlow: "0 0 10px rgba(124,58,237,0.8)",
        headingFont: "'Space Grotesk', sans-serif",
        headingWeight: 600,
        headingLetterSpacing: "-0.025em",
        bodyFont: "'Inter', sans-serif",
        swatches: ["#12121F", "#7C3AED", "#A78BFA", "#F8F8FF"],
        swatchLabels: ["BG", "Primary", "Secondary", "Text"],
        btnBg: "rgba(124,58,237,0.15)",
        btnBorder: "rgba(124,58,237,0.4)",
      },
      {
        id: 2,
        deckLabel: "Deck 02",
        name: "Arctic Sovereign",
        tagline: "Precise. Cold. Commanding.",
        bg: "#050A18",
        gradientOrb1: "rgba(14,165,233,0.14)",
        gradientOrb2: "rgba(56,189,248,0.08)",
        accent: "#0EA5E9",
        accentSoft: "#38BDF8",
        text: "#EFF6FF",
        textMuted: "rgba(239,246,255,0.38)",
        glassBg: "rgba(14,165,233,0.05)",
        glassBorder: "rgba(56,189,248,0.18)",
        glassBlur: "blur(24px)",
        glassShadow: "0 8px 40px rgba(14,165,233,0.10), inset 0 1px 0 rgba(255,255,255,0.06)",
        accentGlow: "0 0 10px rgba(14,165,233,0.75)",
        headingFont: "'Plus Jakarta Sans', sans-serif",
        headingWeight: 600,
        headingLetterSpacing: "-0.02em",
        bodyFont: "'DM Sans', sans-serif",
        swatches: ["#050A18", "#0EA5E9", "#38BDF8", "#EFF6FF"],
        swatchLabels: ["BG", "Primary", "Secondary", "Text"],
        btnBg: "rgba(14,165,233,0.12)",
        btnBorder: "rgba(14,165,233,0.35)",
      },
      {
        id: 3,
        deckLabel: "Deck 03",
        name: "Onyx Aureate",
        tagline: "Rare. Weighted. Timeless.",
        bg: "#09090B",
        gradientOrb1: "rgba(212,175,55,0.11)",
        gradientOrb2: "rgba(245,200,66,0.06)",
        accent: "#D4AF37",
        accentSoft: "#F5C842",
        text: "#FAFAFA",
        textMuted: "rgba(250,250,250,0.38)",
        glassBg: "rgba(212,175,55,0.04)",
        glassBorder: "rgba(212,175,55,0.22)",
        glassBlur: "blur(16px)",
        glassShadow: "0 8px 40px rgba(212,175,55,0.08), inset 0 1px 0 rgba(255,255,255,0.05)",
        accentGlow: "0 0 10px rgba(212,175,55,0.7)",
        headingFont: "'Cormorant Garamond', serif",
        headingWeight: 300,
        headingLetterSpacing: "0.03em",
        bodyFont: "'Outfit', sans-serif",
        swatches: ["#09090B", "#D4AF37", "#F5C842", "#FAFAFA"],
        swatchLabels: ["BG", "Primary", "Secondary", "Text"],
        btnBg: "rgba(212,175,55,0.10)",
        btnBorder: "rgba(212,175,55,0.35)",
      },
    ];

    function BrandCard({ deck }) {
      const [hovered, setHovered] = useState(false);

      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            flex: "1 1 340px",
            maxWidth: "420px",
            minWidth: "300px",
            borderRadius: "24px",
            background: deck.bg,
            border: `1px solid ${deck.glassBorder}`,
            position: "relative",
            overflow: "hidden",
            transition: "transform 0.4s cubic-bezier(0.22,1,0.36,1), box-shadow 0.4s ease",
            transform: hovered ? "translateY(-6px)" : "translateY(0)",
            boxShadow: hovered
              ? `0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px ${deck.glassBorder}`
              : "0 8px 24px rgba(0,0,0,0.3)",
            cursor: "default",
          }}
        >
          {/* Ambient orb 1 */}
          <div style={{
            position: "absolute",
            top: "-60px",
            left: "-40px",
            width: "280px",
            height: "280px",
            borderRadius: "50%",
            background: `radial-gradient(circle, ${deck.gradientOrb1} 0%, transparent 70%)`,
            pointerEvents: "none",
          }} />
          {/* Ambient orb 2 */}
          <div style={{
            position: "absolute",
            bottom: "-60px",
            right: "-40px",
            width: "240px",
            height: "240px",
            borderRadius: "50%",
            background: `radial-gradient(circle, ${deck.gradientOrb2} 0%, transparent 70%)`,
            pointerEvents: "none",
          }} />

          <div style={{ padding: "36px 32px", position: "relative", zIndex: 2, display: "flex", flexDirection: "column", gap: "28px" }}>

            {/* Label row */}
            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{
                width: "6px", height: "6px", borderRadius: "50%",
                background: deck.accent, boxShadow: deck.accentGlow,
              }} />
              <span style={{
                fontFamily: deck.bodyFont, fontSize: "10px",
                letterSpacing: "0.18em", color: deck.textMuted,
                textTransform: "uppercase", fontWeight: 500,
              }}>
                {deck.deckLabel}
              </span>
            </div>

            {/* Theme heading */}
            <div>
              <h2 style={{
                fontFamily: deck.headingFont,
                fontSize: "32px",
                fontWeight: deck.headingWeight,
                color: deck.text,
                letterSpacing: deck.headingLetterSpacing,
                lineHeight: 1.08,
                margin: 0,
              }}>
                {deck.name}
              </h2>
              <p style={{
                fontFamily: deck.bodyFont,
                fontSize: "11px",
                color: deck.accent,
                marginTop: "8px",
                letterSpacing: "0.10em",
                textTransform: "uppercase",
                fontWeight: 500,
              }}>
                {deck.tagline}
              </p>
            </div>

            {/* ─── Liquid Glass Panel ─── */}
            <div style={{
              background: deck.glassBg,
              border: `1px solid ${deck.glassBorder}`,
              backdropFilter: deck.glassBlur,
              WebkitBackdropFilter: deck.glassBlur,
              borderRadius: "16px",
              padding: "24px",
              boxShadow: deck.glassShadow,
            }}>
              {/* Panel header */}
              <div style={{ marginBottom: "18px" }}>
                <div style={{
                  fontFamily: deck.bodyFont, fontSize: "10px",
                  color: deck.textMuted, letterSpacing: "0.14em",
                  textTransform: "uppercase", marginBottom: "6px",
                }}>
                  Custom AI Officer
                </div>
                <div style={{
                  fontFamily: deck.headingFont,
                  fontSize: deck.id === 3 ? "26px" : "22px",
                  fontWeight: deck.headingWeight,
                  color: deck.text,
                  letterSpacing: deck.headingLetterSpacing,
                  lineHeight: 1.15,
                }}>
                  Welcome to Havous
                </div>
              </div>

              {/* Accent divider */}
              <div style={{
                height: "1px",
                background: `linear-gradient(to right, ${deck.accent}55, transparent)`,
                marginBottom: "18px",
              }} />

              {/* Tier rows */}
              {[
                { tier: "Foundation", price: "$950 / mo", active: false },
                { tier: "Elite", price: "$1,750 / mo", active: true },
                { tier: "Executive", price: "$2,950 / mo", active: false },
              ].map(({ tier, price, active }, i, arr) => (
                <div key={tier} style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  padding: "9px 0",
                  borderBottom: i < arr.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    {active && (
                      <div style={{
                        width: "4px", height: "4px", borderRadius: "50%",
                        background: deck.accent, boxShadow: deck.accentGlow,
                        flexShrink: 0,
                      }} />
                    )}
                    <span style={{
                      fontFamily: deck.bodyFont,
                      fontSize: "13px",
                      color: active ? deck.text : deck.textMuted,
                      fontWeight: active ? 500 : 400,
                      marginLeft: active ? 0 : "12px",
                    }}>
                      {tier}
                    </span>
                  </div>
                  <span style={{
                    fontFamily: deck.bodyFont,
                    fontSize: "12px",
                    color: active ? deck.accent : deck.textMuted,
                    fontWeight: active ? 600 : 400,
                    letterSpacing: "0.02em",
                  }}>
                    {price}
                  </span>
                </div>
              ))}
            </div>

            {/* CTA Button (simulated) */}
            <div style={{
              background: deck.btnBg,
              border: `1px solid ${deck.btnBorder}`,
              backdropFilter: "blur(12px)",
              WebkitBackdropFilter: "blur(12px)",
              borderRadius: "12px",
              padding: "14px 20px",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              cursor: "pointer",
            }}>
              <span style={{
                fontFamily: deck.bodyFont,
                fontSize: "13px",
                fontWeight: 500,
                color: deck.text,
                letterSpacing: "0.01em",
              }}>
                Activate Your CAO
              </span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke={deck.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </div>

            {/* Color Palette */}
            <div>
              <div style={{
                fontFamily: deck.bodyFont, fontSize: "10px",
                color: deck.textMuted, letterSpacing: "0.14em",
                textTransform: "uppercase", marginBottom: "10px",
              }}>
                Palette
              </div>
              <div style={{ display: "flex", gap: "8px", alignItems: "flex-start" }}>
                {deck.swatches.map((color, i) => (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "5px" }}>
                    <div style={{
                      width: "32px", height: "32px", borderRadius: "10px",
                      background: color,
                      border: "1px solid rgba(255,255,255,0.10)",
                    }} />
                    <span style={{
                      fontFamily: deck.bodyFont, fontSize: "9px",
                      color: deck.textMuted, letterSpacing: "0.06em",
                      textAlign: "center",
                    }}>
                      {deck.swatchLabels[i]}
                    </span>
                  </div>
                ))}
                {/* Glass swatch */}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "5px" }}>
                  <div style={{
                    width: "32px", height: "32px", borderRadius: "10px",
                    background: deck.glassBg,
                    border: `1px solid ${deck.glassBorder}`,
                    backdropFilter: "blur(8px)",
                  }} />
                  <span style={{
                    fontFamily: deck.bodyFont, fontSize: "9px",
                    color: deck.textMuted, letterSpacing: "0.06em",
                    textAlign: "center",
                  }}>
                    Glass
                  </span>
                </div>
              </div>
            </div>

            {/* Typography */}
            <div style={{ paddingTop: "4px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
              <div style={{
                fontFamily: deck.bodyFont, fontSize: "10px",
                color: deck.textMuted, letterSpacing: "0.14em",
                textTransform: "uppercase", marginBottom: "10px",
              }}>
                Typography
              </div>
              <div style={{
                fontFamily: deck.headingFont,
                fontSize: deck.id === 3 ? "20px" : "18px",
                fontWeight: deck.headingWeight,
                color: deck.text,
                letterSpacing: deck.headingLetterSpacing,
                lineHeight: 1.2,
              }}>
                Aa — {deck.headingFont.replace(/'/g, "").replace(", sans-serif", "").replace(", serif", "")}
              </div>
              <div style={{
                fontFamily: deck.bodyFont,
                fontSize: "12px",
                color: deck.textMuted,
                marginTop: "5px",
                lineHeight: 1.5,
              }}>
                Body — {deck.bodyFont.replace(/'/g, "").replace(", sans-serif", "")}
              </div>
            </div>

          </div>
        </div>
      );
    }

    function App() {
      return (
        <div style={{
          minHeight: "100vh",
          background: "#06060A",
          padding: "64px 32px 80px",
          fontFamily: "'Inter', sans-serif",
        }}>
          {/* Page header */}
          <div style={{ textAlign: "center", marginBottom: "60px" }}>
            <div style={{
              display: "inline-flex",
              alignItems: "center",
              gap: "8px",
              background: "rgba(255,255,255,0.04)",
              border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: "100px",
              padding: "6px 16px",
              marginBottom: "24px",
            }}>
              <div style={{ width: "5px", height: "5px", borderRadius: "50%", background: "#7C3AED", boxShadow: "0 0 8px #7C3AED" }} />
              <span style={{ fontFamily: "'Inter', sans-serif", fontSize: "11px", color: "rgba(255,255,255,0.4)", letterSpacing: "0.16em", textTransform: "uppercase" }}>
                Havous — Brand Identity System
              </span>
            </div>
            <h1 style={{
              fontFamily: "'Space Grotesk', sans-serif",
              fontSize: "clamp(36px, 5vw, 52px)",
              fontWeight: 600,
              color: "#FFFFFF",
              letterSpacing: "-0.03em",
              lineHeight: 1,
              margin: "0 0 16px",
            }}>
              3 Brand Directions
            </h1>
            <p style={{
              fontFamily: "'Inter', sans-serif",
              fontSize: "15px",
              color: "rgba(255,255,255,0.32)",
              maxWidth: "420px",
              margin: "0 auto",
              lineHeight: 1.6,
            }}>
              Select the visual posture for the Havous platform. Each direction represents a distinct brand identity.
            </p>
          </div>

          {/* Cards grid */}
          <div style={{
            display: "flex",
            gap: "24px",
            maxWidth: "1360px",
            margin: "0 auto",
            flexWrap: "wrap",
            justifyContent: "center",
            alignItems: "stretch",
          }}>
            {decks.map(deck => (
              <BrandCard key={deck.id} deck={deck} />
            ))}
          </div>

          {/* Footer */}
          <div style={{
            textAlign: "center",
            marginTop: "64px",
            fontFamily: "'Inter', sans-serif",
            fontSize: "11px",
            color: "rgba(255,255,255,0.18)",
            letterSpacing: "0.10em",
            textTransform: "uppercase",
          }}>
            All decks implement Liquid Glass (Glassmorphism) as the primary interface language
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
